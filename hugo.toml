baseURL = "https://hugo.abyss.dev/"
languageCode = "en-us"
title = "Victor Ashveil"
# Set to true in production (requires git history); keep false for non-git local dev
enableGitInfo = false
enableRobotsTXT = true

[minify]
  minifyOutput = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "dracula"
    noClasses = false

[params]
  description  = "Victor Ashveil — Mentalist & Illusionist. Extraordinary performances for corporate events, private gatherings, and stage shows."
  email        = "booking@victorashveil.com"
  formspree_id = "YOUR_FORMSPREE_ID"

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 2
  [[menu.main]]
    name = "Shows"
    url = "/shows/"
    weight = 3
  # [[menu.main]]
  #   name = "Blog"
  #   url = "/blog/"
  #   weight = 4
  [[menu.main]]
    name = "Contact"
    url = "/contact/"
    weight = 5

[outputs]
  home = ["HTML"]
  page = ["HTML"]
  section = ["HTML"]

[permalinks]
  blog = "/blog/:slug/"
  shows = "/shows/:slug/"
